        .slide-preview-container {

            {
                id: 11,
                title: "10. Linear Algebraic Equations",
                english: "This deals with solving systems of linear equations (Ax = B). Imagine having 100 variables that are all interconnected (like nodes in a circuit or truss members).\n\nWe need to find the values for ALL variables that satisfy ALL equations simultaneously.",
                taglish: "\"Pag marami ka nang variables (x, y, z...) na magkakaugnay. Example: Pag nagbe-bake ka. Flour + Sugar = Dough, pero Sugar + Heat = Caramel. Connected lahat. Sa engineering, ito yung forces sa bawat bakal ng tulay. Pag ginalaw mo isa, damay lahat. Kailangan natin i-solve ng sabay-sabay.\""

            {

                taglish: "\"Parang pag-solusyon sa krimen o puzzle. Eliminate mo muna yung mga variables isa-isa. 'Hindi si X ang killer', 'Hindi si Y'. Hanggang si Z na lang matira. Pag nakuha mo na si Z, babalikan mo yung iba (Back Substitution) para ma-solve lahat. Systematic na pagtanggal ng unknowns.\""

            {
                id: 16,
                title: "15. Trapezoidal Rule",
                english: "The simplest way to integrate. Connect two data points with a straight line, forming a trapezoid underneath. Calculate its area.\n\nFormula: Area ≈ (h/2) * (y0 + y1). Repeat for all segments.",
                taglish: "\"Simpleng logic: Connect mo lang yung dalawang points ng straight line. Tapos kunin mo area ng trapezoid sa ilalim. Medyo rough estimate ito kasi straight line lang gamit mo, pero madaling i-compute kahit calculator lang gamit.\""
            },
            {
                id: 17,
                title: "16. Simpson's Rules",
                english: "Simpson's Rules improve on the Trapezoidal Rule by using Parabolas (curves) instead of straight lines to connect points.\n\nSince most real-world functions are curvy, fitting a parabola gives a much more accurate area estimate with fewer segments.",
                taglish: "\"Upgrade ito ng Trapezoidal. Imbis na straight line, curve (parabola) ang ginagamit pang-connect sa points. Mas swak ito sa mga curve na graph. Isipin mo, mas maganda ang fit ng curve sa bundok kaysa sa straight line diba?\""
            },
            {
                id: 18,
                title: "17. Ordinary Differential Equations (ODEs)",
                english: "ODEs describe rates of change. Solving an ODE allows us to predict the future state of a system given its current state and how it changes.\n\ndy/dt = f(t, y)  ->  \"How does y change as time t moves forward?\"",
                taglish: "\"Ito ang bread and butter ng Physics engines. Sinasabi ng ODE kung 'gaano kabilis magbago' ang isang bagay. Example: Pag may sakit ka, gano kabilis kumalat ang virus? O pag nag-brake ang kotse, gano kabilis siya hihinto? Numerical methods ang sumasagot niyan step-by-step.\""
            },
            {
                id: 19,
                title: "18. Euler's Method",
                english: "Euler's method is the simplest ODE solver. It assumes the slope is constant for a small step size 'h'.\n\nNew Value = Old Value + (Slope × Step Size).\n\nIt's easy but not very accurate unless the step size is tiny.",
                taglish: "\"Imagine mo naglalakad ka na nakapiring. Sinabihan ka lang na 'Ang direction mo ay 30 degrees right'. So hahakbang ka dun. After one step, tatanong ka ulit ng direction. Euler's method yun. Kaso pag malaki hakbang mo, baka mahulog ka na sa bangin bago ka makapag-adjust.\"",

            {
                id: 20,
                title: "19. Runge-Kutta Methods (RK4)",
                english: "RK4 is the industry standard. Instead of taking just one slope (like Euler), it samples the slope at 4 different points within one step and takes a weighted average.\n\nThis results in extremely high accuracy and is used in almost all modern simulation software.",
                taglish: "\"Kung ang Euler ay naglalakad nang nakapiring, ang RK4 naman ay tumitingin muna sa map, chine-check ang GPS, at tumitingin sa paligid bago humakbang. Kumukuha siya ng 4 na estimates bago gumalaw, kaya sobrang accurate niya. Ito ang gamit ng mga engineers!\""
            },
            {
                id: 21,
                title: "20. Conclusion & Applications",
                english: "Numerical methods are everywhere. They simulate the aerodynamics of F1 cars, predict the stock market, render 3D graphics in games, and help design skyscrapers.\n\nWithout these approximations, we couldn't solve the complex problems of the modern world.",
                taglish: "\"Sa madaling salita: Halos lahat ng modern tech—mula sa physics ng Mobile Legends, sa graphics ng PS5, hanggang sa pag-design ng Burj Khalifa—ay tumatakbo gamit ang Numerical Methods. Ito ang hidden hero na nagpapatakbo ng mundo natin.\""
            }
        ];

        // --- Components ---

        // Helper to parse *bold* markdown
        const parseBold = (text) => {
            if (!text) return null;
            // Split by *...* pattern
            const parts = text.split(/(\*[^*]+\*)/g);
            return parts.map((part, i) => {
                if (part.startsWith('*') && part.endsWith('*')) {
                    return <strong key={i} className="text-blue-700 font-extrabold">{part.slice(1, -1)}</strong>;
                }
                return part;
            });
        };

        const SlidePreview = ({ slide, idPrefix = "preview" }) => {
            return (
                <div 
                    id={`${idPrefix}-slide-${slide.id}`}
                    className="slide-preview-container"
                >
                    {/* Header */}
                    <div className="slide-header">
                        <h1 className="slide-title">
                            {slide.title}
                        </h1>
                    </div>

                    {/* Body */}
                    <div className="slide-body">
                        <div className="slide-content-wrapper">
                            {/* Text Column */}
                            <div className="slide-text-col">
                                {parseBold(slide.english)}
                            </div>
                            
                            {/* Image Column (only if image exists) */}
                            {slide.image && (
                                <div className="slide-image-col">
                                    <img 
                                        src={slide.image} 
                                        alt="Slide Visual" 
                                        className="slide-image"
                                    />
                                </div>
                            )}
                        </div>
                    </div>
                    
                    {/* Footer / Taglish Explanation */}
                    <div className="slide-footer">
                         <p className="slide-taglish-text">
                            {parseBold(slide.taglish)}
                        </p>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [slides] = useState(SLIDES);
            const [activeSlideId, setActiveSlideId] = useState(slides[0].id);
            const [isExporting, setIsExporting] = useState(false);
            const [progress, setProgress] = useState({ current: 0, total: 0 });
            const [logs, setLogs] = useState([]);
            const logEndRef = useRef(null);

            const activeSlide = slides.find(s => s.id === activeSlideId) || slides[0];

            useEffect(() => {
                if (logEndRef.current) {
                    logEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [logs]);

            const addLog = (msg) => {
                setLogs(prev => [...prev, `[${new Date().toLocaleTimeString()}] ${msg}`]);
            };

            // --- Export Logic ---
            const captureSlide = async (slide) => {
                await document.fonts.ready;

                const container = document.createElement('div');
                container.style.position = 'fixed';
                container.style.top = '0';
                container.style.left = '0';
                container.style.width = '1280px';
                container.style.height = '720px';
                container.style.zIndex = '-1000'; 
                container.style.visibility = 'visible';
                document.body.appendChild(container);

                return new Promise(async (resolve) => {
                    const root = ReactDOM.createRoot(container);
                    root.render(<SlidePreview slide={slide} idPrefix="export" />);
                    
                    // Allow React to perform initial render
                    await new Promise(r => setTimeout(r, 150));

                    const element = container.querySelector('.slide-preview-container');
                    
                    // Find all images and wait for them to load
                    const imgs = Array.from(container.querySelectorAll('img'));
                    addLog(`Found ${imgs.length} images for "${slide.title}"`);

                    const imgPromises = imgs.map(img => {
                        if (img.complete && img.naturalWidth > 0) return Promise.resolve();
                        return new Promise(res => {
                            img.onload = () => res();
                            img.onerror = () => {
                                console.warn(`Failed to load image for slide: ${slide.title}`);
                                res(); 
                            };
                            // Fallback if onload doesn't fire
                            setTimeout(res, 2000);
                        });
                    });

                    await Promise.all(imgPromises);
                    
                    // Buffer for layout stabilization
                    await new Promise(r => setTimeout(r, 800));

                    try {
                        const canvas = await html2canvas(element, { 
                            scale: 2, 
                            useCORS: true,
                            windowWidth: 1280,
                            windowHeight: 720,
                            x: 0,
                            y: 0,
                            scrollX: 0,
                            scrollY: 0,
                            backgroundColor: null
                        });
                        resolve(canvas);
                    } catch (e) {
                        console.error("Canvas error:", e);
                        resolve(null);
                    } finally {
                        root.unmount();
                        document.body.removeChild(container);
                    }
                });
            };

            const handleExportZip = async () => {
                if (isExporting) return;
                setIsExporting(true);
                setLogs([]);
                setProgress({ current: 0, total: slides.length });
                addLog("Starting ZIP export...");

                try {
                    const zip = new JSZip();
                    const imgFolder = zip.folder("slides");
                    
                    for (let i = 0; i < slides.length; i++) {
                        const slide = slides[i];
                        addLog(`Processing slide ${i + 1}/${slides.length}: "${slide.title}"`);
                        setProgress({ current: i + 1, total: slides.length });
                        
                        const canvas = await captureSlide(slide);
                        if (canvas) {
                            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                            imgFolder.file(`slide_${i + 1}.png`, blob);
                        } else {
                            addLog(`Error capturing slide ${i + 1}`);
                        }
                    }
                    
                    addLog("Generating ZIP file...");
                    const content = await zip.generateAsync({ type: "blob" });
                    saveAs(content, "Numerical_Methods_Course.zip");
                    addLog("ZIP export complete!");
                    await new Promise(r => setTimeout(r, 2000));
                } catch (err) { 
                    console.error(err); 
                    addLog(`CRITICAL ERROR: ${err.message}`);
                    alert("Error exporting ZIP"); 
                } 
                finally { setIsExporting(false); }
            };

            const handleExportPdf = async () => {
                if (isExporting) return;
                setIsExporting(true);
                setLogs([]);
                setProgress({ current: 0, total: slides.length });
                addLog("Starting PDF export...");

                try {
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('l', 'mm', 'a4'); // A4 Landscape
                    const pdfW = pdf.internal.pageSize.getWidth();
                    const pdfH = pdf.internal.pageSize.getHeight();

                    for (let i = 0; i < slides.length; i++) {
                        const slide = slides[i];
                        addLog(`Processing slide ${i + 1}/${slides.length}: "${slide.title}"`);
                        setProgress({ current: i + 1, total: slides.length });

                        const canvas = await captureSlide(slide);
                        if (canvas) {
                            // Use JPEG with 0.8 quality to reduce file size significantly
                            const imgData = canvas.toDataURL('image/jpeg', 0.8);
                            if (i > 0) pdf.addPage();
                            
                            // Fit 16:9 into A4 Landscape
                            const renderH = pdfW * (9/16);
                            const posY = (pdfH - renderH) / 2;
                            pdf.addImage(imgData, 'JPEG', 0, posY, pdfW, renderH);
                        } else {
                            addLog(`Error capturing slide ${i + 1}`);
                        }
                    }
                    
                    addLog("Saving PDF file...");
                    pdf.save("Numerical_Methods_Course.pdf");
                    addLog("PDF export complete!");
                    await new Promise(r => setTimeout(r, 2000));
                } catch (err) { 
                    console.error(err); 
                    addLog(`CRITICAL ERROR: ${err.message}`);
                    alert("Error exporting PDF"); 
                } 
                finally { setIsExporting(false); }
            };

            return (
                <div className="flex h-screen overflow-hidden relative">
                    {/* Sidebar Navigation */}
                    <div className="w-80 bg-gray-900 border-r border-gray-700 flex flex-col text-white shadow-xl z-10">
                        <div className="p-6 border-b border-gray-700 bg-gray-800">
                            <h1 className="font-bold text-2xl text-amber-400">Numerical Methods</h1>
                            <p className="text-sm text-gray-400 mt-1">Full Course Viewer</p>
                        </div>
                        
                        <div className="flex-grow overflow-y-auto p-0">
                            {slides.map((slide, idx) => (
                                <div 
                                    key={slide.id}
                                    onClick={() => !isExporting && setActiveSlideId(slide.id)}
                                    className={`p-4 border-b border-gray-800 cursor-pointer transition-all hover:bg-gray-800 ${ 
                                        slide.id === activeSlideId ? 'bg-blue-900 border-l-4 border-l-blue-400' : ''
                                    } ${isExporting ? 'opacity-50 pointer-events-none' : ''}`}
                                >
                                    <div className="font-medium text-sm text-gray-300 truncate">
                                        {slide.title}
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Export Controls */}
                        <div className="p-6 border-t border-gray-700 bg-gray-800 space-y-3">
                            <button 
                                onClick={handleExportZip} 
                                disabled={isExporting}
                                className="w-full py-3 bg-gray-700 hover:bg-gray-600 disabled:opacity-50 text-white rounded shadow font-semibold transition-colors flex items-center justify-center gap-2"
                            >
                                Download Images (ZIP)
                            </button>
                            <button 
                                onClick={handleExportPdf}
                                disabled={isExporting} 
                                className="w-full py-3 bg-red-600 hover:bg-red-700 disabled:opacity-50 text-white rounded shadow font-semibold transition-colors flex items-center justify-center gap-2"
                            >
                                Download PDF
                            </button>
                            <a href="index.html" className="block text-center text-xs text-gray-400 hover:text-white mt-2">← Back to Course Home</a>
                        </div>
                    </div>

                    {/* Main Viewer */}
                    <div className="flex-grow bg-gray-800 flex items-center justify-center p-10 overflow-auto relative">
                        {/* Scale Wrapper to fit the 1280x720 slide on any screen */}
                        <div style={{ transform: 'scale(0.85)', transformOrigin: 'center' }}>
                             <SlidePreview slide={activeSlide} />
                        </div>
                    </div>

                    {/* Export Progress Overlay */}
                    {isExporting && (
                        <div className="absolute inset-0 bg-black/80 z-50 flex items-center justify-center">
                            <div className="bg-gray-800 p-8 rounded-xl shadow-2xl max-w-2xl w-full border border-gray-600">
                                <h2 className="text-2xl font-bold text-white mb-4 flex items-center gap-3">
                                    <span className="animate-spin">⏳</span> Exporting...
                                </h2>
                                
                                {/* Progress Bar */}
                                <div className="w-full bg-gray-700 rounded-full h-4 mb-2 overflow-hidden">
                                    <div 
                                        className="bg-blue-500 h-full transition-all duration-300 ease-out"
                                        style={{ width: `${(progress.current / progress.total) * 100}%` }}
                                    ></div>
                                </div>
                                <div className="flex justify-between text-gray-400 text-sm mb-6">
                                    <span>Progress</span>
                                    <span>{progress.current} / {progress.total} slides</span>
                                </div>

                                {/* Logs Console */}
                                <div className="bg-black/50 rounded p-4 font-mono text-xs text-green-400 h-48 overflow-y-auto border border-gray-700 shadow-inner">
                                    {logs.map((log, i) => (
                                        <div key={i} className="mb-1 border-b border-gray-800 pb-1 last:border-0">{log}</div>
                                    ))}
                                    <div ref={logEndRef} />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
